server:
  port: 8083

spring:
  application:
    name: core-ledger-service
  
  datasource:
    url: jdbc:postgresql://localhost:5434/ledgerdb
    username: ledgeruser
    password: ledgerpassword
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: always

logging:
  level:
    com.bkbank.ledger: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT Configuration
jwt:
  secret: "BkBankLedgerSecretKey2025VeryLongSecretKey12345678" # Min 32 chars
  expiration: 86400000 # 24 hours in milliseconds

# System API Key (used by CMS service)
system:
  api-key: "bkbank-internal-system-api-key-2025"
