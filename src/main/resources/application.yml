server:
  port: 8083

spring:
  application:
    name: core-ledger-service
  
  datasource:
    url: jdbc:postgresql://localhost:5434/ledgerdb
    username: ledgeruser
    password: ledgerpassword
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  sql:
    init:
      mode: always

logging:
  level:
    com.bkbank.ledger: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
